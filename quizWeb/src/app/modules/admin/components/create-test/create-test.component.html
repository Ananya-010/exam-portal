<div class="test-form-bg">
  <div class="test-form-parent">
    <div class="test-form-card">

      <h2 class="form-title">Create a New Test</h2>

      <form nz-form [formGroup]="testForm" class="test-form" (ngSubmit)="submitForm()">
        <!-- Title -->
        <nz-form-item>
          <nz-form-label [nzNoColon]="true">Title</nz-form-label>
          <nz-form-control nzErrorTip="This input is required!">
            <input nz-input type="text" formControlName="title" placeholder="Enter Test Title" />
          </nz-form-control>
        </nz-form-item>

        <!-- Time per question -->
        <nz-form-item>
          <nz-form-label [nzNoColon]="true">Time Per Question</nz-form-label>
          <nz-form-control nzErrorTip="This input is required!">
            <input nz-input type="number" formControlName="time" placeholder="Time (seconds per question)" />
          </nz-form-control>
        </nz-form-item>

        <!-- Description -->
        <nz-form-item>
          <nz-form-label [nzNoColon]="true">Description</nz-form-label>
          <nz-form-control nzErrorTip="This input is required!">
            <textarea nz-input rows="4" formControlName="description" placeholder="Enter a short test description..."></textarea>
          </nz-form-control>
        </nz-form-item>

        <!-- Submit Button -->
        <div class="button-container">
          <button nz-button [nzType]="'primary'" class="submit-btn" [disabled]="testForm.invalid">
            <i nz-icon nzType="file-done" nzTheme="outline"></i> Submit Test
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
