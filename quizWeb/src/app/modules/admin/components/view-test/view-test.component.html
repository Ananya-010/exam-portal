<div class="quiz-page">
  <form>
    <div class="question-card" *ngFor="let question of questions">
      <h3 class="question-title">{{ question.questionText }}</h3>

      <div class="option" *ngFor="let option of ['A', 'B', 'C', 'D']">
        <label>
          <input
            type="radio"
            name="question{{ question.id }}"
          />
          {{ question['option' + option] }}
        </label>
      </div>
    </div>
  </form>
</div>
