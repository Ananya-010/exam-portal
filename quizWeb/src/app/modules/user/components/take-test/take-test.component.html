<div class="test-page">
  <div class="timer-container">
    <div class="timer">
      ⏱️ Time Remaining: {{ getFormattedTime() }}
    </div>
  </div>

  <form (ngSubmit)="submitAnswers()">
    <div class="question-card" *ngFor="let question of questions">
      <h3 class="question-title">{{ question.questionText }}</h3>

      <div class="option" *ngFor="let opt of [question.optionA, question.optionB, question.optionC, question.optionD]">
        <label>
          <input
            type="radio"
            name="question{{ question.id }}"
            (change)="onAnswerChange(question.id, opt)"
          />
          {{ opt }}
        </label>
      </div>
    </div>

    <div class="submit-container">
      <button nz-button nzType="primary" type="submit" class="submit-btn">
        Submit Answers
      </button>
    </div>
  </form>
</div>
