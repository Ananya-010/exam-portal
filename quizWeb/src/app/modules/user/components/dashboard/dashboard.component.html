<div class="main">
  <div nz-row>
    <div nz-col nzSpan="24" style="margin-bottom: 20px;">
      <span *ngFor="let test of tests" class="test-wrapper">
        <nz-card [nzBordered]="true" class="test" nzTitle="{{ test.title }}">
          <div class="test-content">
            <p><strong>Time:</strong> {{ getFormattedTime(test.time) }}</p>
            <p><strong>Description:</strong> {{ test.description }}</p>

            <div class="button-container">
              <button
                nz-button
                nzType="primary"
                routerLink="/user/take-test/{{ test.id }}"
                class="start-btn"
              >
                <i nz-icon nzType="play-circle" nzTheme="outline"></i> Start Test
              </button>
            </div>
          </div>
        </nz-card>
      </span>
    </div>
  </div>
</div>
